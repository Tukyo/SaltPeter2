appId: com.saltpeter.app
productName: SaltPeter
copyright: Copyright © 2026

publish:
  provider: github
  owner: Tukyo
  repo: SaltPeter2
  releaseType: release

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - src/game/resources/**/*
  - package.json

win:
  target:
    - target: nsis
      arch: x64
  icon: build/icon.ico

mac:
  target:
    - target: dmg
      arch: x64
  icon: build/icon.icns

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
